version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mcp-server:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/mcp?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - PORT=8080
      - ENV=production
      - LOCAL_DEV=true
      - ADMIN_EMAIL=akhilkumar332@gmail.com
      - BASE_URL=http://localhost:8080
      - STRIPE_API_KEY=sk_test_...
      - STRIPE_WEBHOOK_SECRET=whsec_...
      - STRIPE_PRO_PRICE_ID=price_...
      - CSRF_KEY=9478330a1088469a91088469a1088469 -- replace this with a real 32-byte key in production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
